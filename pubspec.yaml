name: transport_sy
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  core_package:
    path: ../core_package
  intl: ^0.20.2
  quickalert: ^1.1.0
  retrofit: ^4.4.2
  icons_plus: ^5.0.0
  faker: ^2.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  json_serializable: ^6.9.5
  build_runner: ^2.4.15
  injectable_generator: ^3.0.2




flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/font/
    - assets/images/
    - assets/maps/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/font/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/font/Cairo-Light.ttf
          weight: 300
        - asset: assets/font/Cairo-Regular.ttf
          weight: 400
        - asset: assets/font/Cairo-Medium.ttf
          weight: 500
        - asset: assets/font/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/font/Cairo-Bold.ttf
          weight: 700
        - asset: assets/font/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/font/Cairo-Black.ttf
          weight: 900


flutter_gen:
  output: lib/generated/generated_assets/
  integrations:
    flutter_svg: true